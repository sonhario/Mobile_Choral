<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Laptop Choral — Mobile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Courier New', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  #video-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #score-display {
    position: absolute;
    top: 8px;
    left: 8px;
    font-size: 11px;
    opacity: 0.5;
    pointer-events: none;
    line-height: 1.4;
    max-width: 60%;
  }

  #score-display .current { color: #fff; opacity: 1; }
  #score-display .past { color: #666; }
  #score-display .future { color: #999; }

  #controls {
    background: #111;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-top: 1px solid #222;
  }

  #play-btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 14px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    transition: opacity 0.2s;
  }

  #play-btn:active { opacity: 0.7; }
  #play-btn.playing { background: #333; color: #fff; }

  #progress-bar {
    width: 100%;
    height: 3px;
    background: #333;
  }

  #progress-fill {
    height: 100%;
    background: #fff;
    width: 0%;
    transition: width 0.3s linear;
  }

  #start-screen {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 20px;
    padding: 40px;
    text-align: center;
  }

  #start-screen h1 {
    font-size: 24px;
    font-weight: normal;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  #start-btn {
    background: none;
    border: 1px solid #fff;
    color: #fff;
    padding: 16px 48px;
    font-size: 16px;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    letter-spacing: 3px;
    margin-top: 20px;
    transition: background 0.2s, color 0.2s;
  }

  #start-btn:active { background: #fff; color: #000; }

  #loading {
    display: none;
    margin-top: 16px;
    width: 200px;
  }

  #loading p {
    font-size: 12px;
    opacity: 0.5;
    margin-bottom: 6px;
  }

  #load-bar {
    width: 100%;
    height: 2px;
    background: #333;
  }

  #load-fill {
    height: 100%;
    background: #fff;
    width: 0%;
    transition: width 0.2s linear;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="start-screen">
  <h1>Laptop Choral</h1>
  <button id="start-btn">ENTRAR</button>
  <div id="loading">
    <p>carregando...</p>
    <div id="load-bar"><div id="load-fill"></div></div>
  </div>
</div>

<div id="video-container">
  <video id="video" preload="metadata" playsinline webkit-playsinline>
    <source src="leve_540p.mp4" type="video/mp4">
  </video>
  <div id="score-display"></div>
</div>

<div id="controls">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <button id="play-btn">PLAY</button>
</div>

<script>
const FRAGMENTS = [
  { id: 1,  start: 2.0,   end: 5.5   },
  { id: 2,  start: 8.0,   end: 10.2  },
  { id: 3,  start: 14.5,  end: 18.0  },
  { id: 4,  start: 22.0,  end: 24.5  },
  { id: 5,  start: 30.0,  end: 35.0  },
  { id: 6,  start: 40.0,  end: 42.8  },
  { id: 7,  start: 48.0,  end: 53.0  },
  { id: 8,  start: 58.0,  end: 61.5  },
  { id: 9,  start: 68.0,  end: 72.0  },
  { id: 10, start: 78.0,  end: 80.5  },
  { id: 11, start: 85.0,  end: 90.0  },
  { id: 12, start: 95.0,  end: 98.5  },
  { id: 13, start: 105.0, end: 110.0 },
  { id: 14, start: 118.0, end: 122.0 },
  { id: 15, start: 130.0, end: 135.0 },
  { id: 16, start: 140.0, end: 145.5 },
  { id: 17, start: 150.0, end: 155.0 },
];

const SCORE_CONFIG = {
  targetDuration: 90,
  durationVariance: 15,
  maxRepeats: 3,
  repeatProbability: 0.3,
};

function generateScore() {
  const target = SCORE_CONFIG.targetDuration +
    (Math.random() * 2 - 1) * SCORE_CONFIG.durationVariance;

  const score = [];
  let totalDuration = 0;
  const shuffled = [...FRAGMENTS].sort(() => Math.random() - 0.5);
  let idx = 0;

  while (totalDuration < target && idx < shuffled.length * 3) {
    const frag = shuffled[idx % shuffled.length];
    const fragDuration = frag.end - frag.start;

    let repeats = 1;
    if (Math.random() < SCORE_CONFIG.repeatProbability) {
      repeats = 1 + Math.floor(Math.random() * SCORE_CONFIG.maxRepeats);
    }

    for (let r = 0; r < repeats; r++) {
      if (totalDuration + fragDuration > target + SCORE_CONFIG.durationVariance) break;
      score.push({ ...frag, repeatIndex: r });
      totalDuration += fragDuration;
    }
    idx++;
  }

  return { score, totalDuration };
}

const video = document.getElementById('video');
let audioCtx = null;
let currentScore = null;
let currentStep = -1;
let isPlaying = false;
let scoreStartTime = 0;
let stepTimeout = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaElementSource(video);
  source.connect(audioCtx.destination);
}

function playScore() {
  if (isPlaying) { stopScore(); return; }

  const { score, totalDuration } = generateScore();
  currentScore = score;
  currentStep = -1;
  isPlaying = true;
  scoreStartTime = Date.now();

  document.getElementById('play-btn').textContent = 'GERAR NOVA PARTITURA';
  document.getElementById('play-btn').classList.add('playing');

  renderScoreDisplay();
  playNextStep();
}

function stopScore() {
  isPlaying = false;
  currentStep = -1;
  if (stepTimeout) clearTimeout(stepTimeout);
  video.pause();
  document.getElementById('play-btn').textContent = 'PLAY';
  document.getElementById('play-btn').classList.remove('playing');
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('score-display').innerHTML = '';
}

function playNextStep() {
  if (!isPlaying) return;
  currentStep++;

  if (currentStep >= currentScore.length) { stopScore(); return; }

  const step = currentScore[currentStep];
  video.currentTime = step.start;

  video.onseeked = () => {
    video.onseeked = null;
    if (!isPlaying) return;

    video.play();
    renderScoreDisplay();
    updateProgress();

    const onTimeUpdate = () => {
      if (video.currentTime >= step.end) {
        video.removeEventListener('timeupdate', onTimeUpdate);
        video.pause();
        playNextStep();
      }
    };
    video.addEventListener('timeupdate', onTimeUpdate);

    stepTimeout = setTimeout(() => {
      video.removeEventListener('timeupdate', onTimeUpdate);
      video.pause();
      playNextStep();
    }, ((step.end - step.start) / video.playbackRate + 0.5) * 1000);
  };
}

function renderScoreDisplay() {
  if (!currentScore) return;
  const display = document.getElementById('score-display');
  let html = '';
  const s0 = Math.max(0, currentStep - 2);
  const s1 = Math.min(currentScore.length, currentStep + 5);

  for (let i = s0; i < s1; i++) {
    const s = currentScore[i];
    const cls = i < currentStep ? 'past' : i === currentStep ? 'current' : 'future';
    const rep = s.repeatIndex > 0 ? ` (x${s.repeatIndex + 1})` : '';
    html += `<div class="${cls}">${String(i + 1).padStart(2, '0')} ${s.start.toFixed(1)}s–${s.end.toFixed(1)}s${rep}</div>`;
  }
  display.innerHTML = html;
}

function updateProgress() {
  if (!isPlaying || !currentScore) return;
  const elapsed = (Date.now() - scoreStartTime) / 1000;
  let total = 0;
  for (const s of currentScore) total += (s.end - s.start);
  const pct = Math.min(100, (elapsed / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  if (isPlaying) requestAnimationFrame(updateProgress);
}

document.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const btn = document.getElementById('start-btn');
  const loading = document.getElementById('loading');
  const loadFill = document.getElementById('load-fill');

  btn.style.display = 'none';
  loading.style.display = 'block';

  // Track buffering progress
  const onProgress = () => {
    if (video.buffered.length > 0) {
      const pct = (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;
      loadFill.style.width = pct + '%';
    }
  };
  video.addEventListener('progress', onProgress);

  // When enough is buffered, enter
  const onCanPlay = () => {
    video.removeEventListener('canplaythrough', onCanPlay);
    video.removeEventListener('progress', onProgress);
    loadFill.style.width = '100%';
    setTimeout(() => {
      document.getElementById('start-screen').classList.add('hidden');
    }, 200);
  };
  video.addEventListener('canplaythrough', onCanPlay);

  // Force load
  video.preload = 'auto';
  video.load();
});

document.getElementById('play-btn').addEventListener('click', playScore);
</script>

</body>
</html>
